version: "3.8"

services:
  app:
    # Build image menggunakan Dockerfile di direktori saat ini
    build: .
    container_name: spk-app
    # Mapping port: HOST_PORT:CONTAINER_PORT
    # Sesuai ketentuan, gunakan port 8001 di host dan port 80 di container
    ports:
      - "8001:80"
    # Mount folder proyek Anda ke dalam container,
    # memastikan perubahan kode di host langsung tercermin.
    volumes:
      - .:/var/www/html
    # Menggunakan mode 'host' network untuk mempermudah koneksi ke MySQL host
    # *CATATAN: Ini membuat container berbagi network stack dengan host.
    # Alternatif yang lebih aman adalah menggunakan 'host.docker.internal'.
    # Jika Anda ingin menggunakan 'host.docker.internal' (direkomendasikan):
    # network_mode: bridge (default)
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    network_mode: "host"
    restart: always
