# /config/nginx.conf

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Tentukan root direktori ke folder public CodeIgniter 4
    root /var/www/html/public;

    # File index utama
    index index.php index.html index.htm;

    server_name _;

    location / {
        # Coba layani file secara langsung, lalu direktori, jika tidak ada, fallback ke index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Teruskan script PHP ke FastCGI server (PHP-FPM)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # Gunakan socket PHP-FPM
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }

    # Tolak akses ke file .htaccess
    location ~ /\.ht {
        deny all;
    }
}
