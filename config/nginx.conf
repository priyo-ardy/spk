# /config/nginx.conf

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Tentukan root direktori ke folder public CodeIgniter 4
    root /var/www/html/public;

    # File index utama
    index index.php index.html index.htm;

    server_name _;

    location / {
        # Coba layani file secara langsung, lalu direktori, jika tidak ada, fallback ke index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Teruskan script PHP ke FastCGI server (PHP-FPM)
    location ~ \.php$ {
        # include snippets/fastcgi-php.conf;
        # Gunakan socket PHP-FPM
        # fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        
        fastcgi_index index.php;
        include fastcgi_params;

        # --- MODIFIKASI PENTING DI SINI ---
        # Teruskan informasi IP dan Host asli ke PHP
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_PORT $server_port;
    }

    # Tolak akses ke file .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Tolak akses langsung ke directory public js, uploads, css
    location ~ /public/js/ {
        deny all;
    }
    location ~ /public/uploads/ {
        deny all;
    }
    location ~ /public/css/ {
        deny all;
    }
}
